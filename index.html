<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管用料計算工具</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>管用料計算工具</h1>

    <div id="stock-container">
      <h3>單支最大長度 <small style="color: #666; font-weight: normal;">(若有夾料需求請自行扣除後輸入)</small></h3>
      <button id="add-stock-btn" class="add-btn">＋ 新增客戶料</button>
      <div id="stock-inputs">
        <div class="input-row">
  <span>種類</span> 
  <input type="text" class="stock-type" placeholder="管材種類/說明">
  
  <span>長度</span> 
  <input type="number" class="stock" placeholder="長度 (5850)">
  
  <span>數量</span> 
  <input type="number" class="stock-qty" placeholder="數量 (1)">
  
  <button type="button" class="remove-btn">✕</button>
</div>
      </div>
    </div>

    <div id="demand-container">
    <h3>需求列表</h3>
    <div class="action-bar" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <button id="add-demand-btn" class="add-btn">＋ 新增規格</button>
        
        <div class="file-input-container">
    <label for="excel-file" class="file-label" style="cursor: pointer; background: #e1e1e1; padding: 8px 15px; border-radius: 4px; border: 1px solid #ccc; display: inline-block;">
        📥 選擇 Excel 檔案
    </label>
    
    <input type="file" id="excel-file" accept=".xlsx,.xls">
    
    <span id="file-name">未選擇檔案</span>
</div>
    </div>
    <div id="demand-inputs"></div>
</div>

    <div class="control-panel">
    <button id="run-btn" class="primary-btn">🚀 開始計算</button>
    <button id="export-btn" class="secondary-btn" disabled>📊 匯出 Excel</button>
    
    <button id="clear-results-btn" class="secondary-btn" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #444;">🧹 僅清除結果</button>
    <button id="clear-all-btn" class="secondary-btn">🗑️ 全部重置</button>
</div>

    <hr>

    <h2>計算結果</h2>
    <div id="result">
      <p style="color: #999; text-align: center;">尚未有計算結果，請點擊上方按鈕開始。</p>
    </div>

    <script src="js/xlsx-loader.js"></script>
    <script src="js/exporter.js"></script>
    <script src="js/simple-main.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(registration => {
            console.log('SW 註冊成功:', registration.scope);
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBar();
                }
              });
            });
          });
        });
      }

      function showUpdateBar() {
        let updateBar = document.getElementById('update-bar') || document.createElement('div');
        updateBar.id = 'update-bar';
        updateBar.className = 'update-notification';
        updateBar.innerHTML = `
          <span>✨ 發現新版本！</span>
          <button onclick="location.reload()">立即更新</button>
        `;
        document.body.appendChild(updateBar);
      }
    </script>
  </div>
</body>
</html>
